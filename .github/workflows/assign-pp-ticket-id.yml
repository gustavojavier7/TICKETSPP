name: Assign PP Ticket ID

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign_pp_id:
    runs-on: ubuntu-latest
    steps:
      - name: Build PP ID
        id: pp
        run: |
          ISSUE_NUMBER=${{ github.event.issue.number }}
          printf -v PADDED "%04d" "$ISSUE_NUMBER"
          echo "pp_id=PP-${PADDED}" >> "$GITHUB_OUTPUT"

      - name: Prefix issue title with PP ID
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const ppId = '${{ steps.pp.outputs.pp_id }}';
            const currentTitle = issue.title || '';
            const normalizedPrefix = `[${ppId}]`;

            if (!currentTitle.startsWith(normalizedPrefix)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: `${normalizedPrefix} ${currentTitle}`.trim()
              });
            }

      - name: Add PP ID comment
        uses: actions/github-script@v7
        with:
          script: |
            const ppId = '${{ steps.pp.outputs.pp_id }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `ID externo asignado automáticamente: **${ppId}**`
            });
