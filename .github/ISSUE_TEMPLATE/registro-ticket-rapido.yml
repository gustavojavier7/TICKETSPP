name: "Registrar ticket rápido"
description: "Alta operativa de tickets de cámaras e infraestructura."
title: "[TICKET] "
labels: ["tipo:registrar-ticket", "estado:abierto"]
body:
  - type: markdown
    attributes:
      value: |
        Complete los campos obligatorios para registrar el ticket operativo.

  - type: dropdown
    id: solicitante
    attributes:
      label: Solicitante
      options:
        - Gustavo López
        - Jennifer Castilla
        - Evelin Sosa
        - Jesús Martín
    validations:
      required: true

  - type: dropdown
    id: sistema_afectado
    attributes:
      label: Sistema afectado
      options:
        - HIKVISION
        - DIGIFORT
        - CCURE
    validations:
      required: true

  - type: textarea
    id: describe_falla
    attributes:
      label: DESCRIBE LA FALLA
      description: "En la primera línea incluí el resumen corto que irá al título."
      placeholder: |
        REF: 3099: HIKVISION 1 6 PASILLO LN Cableado obsoleto
        Detalle completo...
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: PRIORIDAD
      options:
        - BAJA
        - MEDIA
        - ALTA
        - URGENTE
    validations:
      required: true

  - type: dropdown
    id: estado_ticket
    attributes:
      label: ESTADO DEL TICKET
      description: "Campo administrativo."
      options:
        - ABIERTO
        - EN CURSO
        - ESPERANDO RESPUESTA
        - CERRADO
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: escalamiento_condicional
    attributes:
      label: ESCALAMIENTO CONDICIONAL
      options:
        - label: Respuesta del Proveedor recibida
        - label: Requiere reemplazos
        - label: Requiere visita en sitio
        - label: Requiere CAPEX
        - label: Bloqueado por tercero

  - type: textarea
    id: detalles_notas
    attributes:
      label: Detalles o notas
      placeholder: "Ej: Cableado obsoleto. Se incluye en CAPEX 2026."

  - type: input
    id: link_referencia
    attributes:
      label: Link
      description: "URL de referencia (opcional)."
      placeholder: "https://..."

  - type: input
    id: id_ticket_externo
    attributes:
      label: ID Ticket
      description: "Ej: PP-0005 (si existe en sistema externo)."
      placeholder: "PP-0000"

  - type: input
    id: estado_anterior
    attributes:
      label: Estado Anterior
      description: "Solo para uso administrativo/histórico."
      placeholder: "ABIERTO / EN CURSO / ESPERANDO RESPUESTA / CERRADO"

  - type: markdown
    attributes:
      value: |
        Campos automáticos en GitHub:
        - Marca temporal: `created_at`
        - Fecha último cambio: `updated_at`
