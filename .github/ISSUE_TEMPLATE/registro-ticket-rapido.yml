name: "Registrar ticket rápido"
description: "Alta operativa de tickets de cámaras e infraestructura."
title: "[TICKET] "
labels: ["tipo:registrar-ticket", "estado:abierto"]
body:
  - type: markdown
    attributes:
      value: |
        Complete los campos obligatorios para registrar el ticket operativo.

  - type: dropdown
    id: tipo_solicitud
    attributes:
      label: Tipo de solicitud
      options:
        - Registrar ticket rápido
      default: 0
    validations:
      required: true

  - type: dropdown
    id: solicitante
    attributes:
      label: Solicitante
      options:
        - Evelin Sosa
        - Jennifer Castilla
        - Jesús Martín
        - Gustavo López
    validations:
      required: true

  - type: dropdown
    id: sistema_afectado
    attributes:
      label: Sistema afectado
      options:
        - DIGIFORT
        - HIKVISION
        - CCURE
        - WINDOWS
        - REDES
    validations:
      required: true

  - type: textarea
    id: describe_falla
    attributes:
      label: DESCRIBE LA FALLA
      description: "En la primera línea incluí el resumen corto que irá al título."
      placeholder: |
        REF: 3099: HIKVISION 1 6 PASILLO LN Cableado obsoleto
        Detalle completo...
    validations:
      required: true

  - type: dropdown
    id: prioridad
    attributes:
      label: PRIORIDAD
      options:
        - BAJA
        - MEDIA
        - ALTA
        - URGENTE
    validations:
      required: true

  - type: dropdown
    id: estado_ticket
    attributes:
      label: ESTADO DEL TICKET
      description: "Campo administrativo."
      options:
        - ABIERTO
        - CERRADO
        - ESPERANDO RESPUESTA
        - EN CURSO
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: escalamiento_condicional
    attributes:
      label: ESCALAMIENTO CONDICIONAL
      options:
        - label: Respuesta del Proveedor recibida
        - label: Requiere reemplazos

  - type: textarea
    id: detalles_notas
    attributes:
      label: Detalles o notas
      placeholder: "Ej: Cableado obsoleto. Se incluye en CAPEX 2026."

  - type: markdown
    attributes:
      value: |
        Campos automáticos en GitHub:
        - Marca temporal: `created_at`
        - Fecha último cambio: `updated_at`
